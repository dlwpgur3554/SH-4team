<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Posts</title>
  <link rel="stylesheet" href="MyPage.css" />
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #2B2B2B;
      color: #F0E7DD;
    }

    .main-content {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem;
    }

    .posts-box {
      width: 100%;
      max-width: 800px;
    }

    h2 {
      margin-bottom: 1.5rem;
    }

    .post-card {
      background-color: #3A3A3A;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .post-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .post-content {
      font-size: 0.95rem;
      color: #DDD;
      margin-bottom: 1rem;
    }

    .btn-group {
      display: flex;
      gap: 0.5rem;
    }

    .btn-group button {
      background-color: #F0E7DD;
      color: #2B2B2B;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-group button:hover {
      background-color: #e6dbd0;
    }

    .no-posts {
      text-align: center;
      margin-top: 3rem;
      color: #AAA;
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="posts-box">
      <h2>내 게시물 확인</h2>

      <div class="post-card" id="post1">
        <div class="post-title">첫 번째 게시물 제목</div>
        <div class="post-content">여기는 게시물 내용이 들어가는 부분입니다. 간단한 미리보기를 보여줘요.</div>
        <div class="btn-group">
          <button onclick="editPost('post1')">수정</button>
          <button onclick="deletePost('post1')">삭제</button>
        </div>
      </div>

      <div class="post-card" id="post2">
        <div class="post-title">두 번째 게시물 제목</div>
        <div class="post-content">이곳도 게시물 내용을 미리보기 형태로 보여주는 부분이에요.</div>
        <div class="btn-group">
          <button onclick="editPost('post2')">수정</button>
          <button onclick="deletePost('post2')">삭제</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function editPost(postId) {
      alert(`"${postId}" 게시물을 수정합니다.`);
    }

    function deletePost(postId) {
      const confirmed = confirm("정말 이 게시물을 삭제하시겠습니까?");
      if (confirmed) {
        const post = document.getElementById(postId);
        if (post) post.remove();
      }
    }
  </script>
</body>
</html>
